<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="demo.css">
</head>
<body>
    <div id="cont">
        <h1>Password Generator</h1>

        <div id="one">
            <input type="checkbox" id="numb">
            <h5>Number</h5>
        </div>

        <div id="two">
            <input type="checkbox" id="Lc">
            <h5>LowerCase</h5>
        </div>

        <div id="three">
            <input type="checkbox" id="Uc">
            <h5>Uppercase</h5>
        </div>

        <div id="Four">
            <input type="checkbox" id="Sym">
            <h5>Symbols</h5>
        </div>

        <div id="five">
            <input type="number" id="len">
            <h5>Password length</h5>
        </div>

        <button onclick=" RandomPass()">Submit</button>
        <h3 id="res"></h3>
    </div>
</body>
<script src="demo.js"></script>
</html>
